<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Shop Manager</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [email, setEmail] = useState('admin@printshop.com');
            const [password, setPassword] = useState('admin123');
            const [loggedIn, setLoggedIn] = useState(false);

            const handleLogin = () => {
                if (email === 'admin@printshop.com' && password === 'admin123') {
                    setLoggedIn(true);
                } else if (email === 'user@printshop.com' && password === 'user123') {
                    setLoggedIn(true);
                } else {
                    alert('Invalid credentials!\n\nUse:\nEmail: admin@printshop.com\nPassword: admin123');
                }
            };

            if (loggedIn) {
                return (
                    <div style={{ minHeight: '100vh', background: '#f5f5f5', padding: '20px' }}>
                        <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
                            <header style={{ background: 'white', padding: '20px', borderRadius: '8px', marginBottom: '20px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
                                <h1 style={{ color: '#333' }}>🖨️ Print Shop Manager</h1>
                                <p style={{ color: '#666', marginTop: '5px' }}>Financial Management System</p>
                            </header>

                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '20px', marginBottom: '20px' }}>
                                <div style={{ background: 'white', padding: '20px', borderRadius: '8px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
                                    <h3 style={{ color: '#666', marginBottom: '10px' }}>Monthly Income</h3>
                                    <p style={{ fontSize: '32px', fontWeight: 'bold', color: '#10b981' }}>GH₵5,680</p>
                                </div>
                                <div style={{ background: 'white', padding: '20px', borderRadius: '8px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
                                    <h3 style={{ color: '#666', marginBottom: '10px' }}>Monthly Expenses</h3>
                                    <p style={{ fontSize: '32px', fontWeight: 'bold', color: '#ef4444' }}>GH₵3,450</p>
                                </div>
                                <div style={{ background: 'white', padding: '20px', borderRadius: '8px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
                                    <h3 style={{ color: '#666', marginBottom: '10px' }}>Monthly Profit</h3>
                                    <p style={{ fontSize: '32px', fontWeight: 'bold', color: '#3b82f6' }}>GH₵2,230</p>
                                </div>
                                <div style={{ background: 'white', padding: '20px', borderRadius: '8px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
                                    <h3 style={{ color: '#666', marginBottom: '10px' }}>Pending Tasks</h3>
                                    <p style={{ fontSize: '32px', fontWeight: 'bold', color: '#f59e0b' }}>3</p>
                                </div>
                            </div>

                            <div style={{ background: 'white', padding: '20px', borderRadius: '8px', marginBottom: '20px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
                                <h2 style={{ marginBottom: '15px', color: '#333' }}>📊 Dashboard</h2>
                                <p style={{ color: '#666', marginBottom: '10px' }}>Sales Records: 117 total</p>
                                <p style={{ color: '#666', marginBottom: '10px' }}>Expense Records: 39 total</p>
                                <p style={{ color: '#666' }}>Imported from Manus App ✅</p>
                            </div>

                            <button 
                                onClick={() => setLoggedIn(false)}
                                style={{ padding: '12px 24px', background: '#667eea', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', fontSize: '16px' }}
                            >
                                Logout
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
                    <div style={{ background: 'white', padding: '40px', borderRadius: '8px', boxShadow: '0 20px 60px rgba(0,0,0,0.3)', width: '100%', maxWidth: '400px' }}>
                        <h1 style={{ textAlign: 'center', marginBottom: '30px', color: '#333', fontSize: '28px' }}>🖨️ Print Shop Manager</h1>
                        
                        <input
                            type="email"
                            placeholder="Email"
                            value={email}
                            onChange={(e) => setEmail(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                            style={{ width: '100%', padding: '12px', marginBottom: '12px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '14px', boxSizing: 'border-box' }}
                        />
                        
                        <input
                            type="password"
                            placeholder="Password"
                            value={password}
                            onChange={(e) => setPassword(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                            style={{ width: '100%', padding: '12px', marginBottom: '20px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '14px', boxSizing: 'border-box' }}
                        />
                        
                        <button
                            onClick={handleLogin}
                            style={{ width: '100%', padding: '12px', background: '#667eea', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', fontSize: '16px' }}
                        >
                            Sign In
                        </button>

                        <div style={{ textAlign: 'center', marginTop: '20px', borderTop: '1px solid #eee', paddingTop: '20px' }}>
                            <p style={{ fontSize: '12px', color: '#999', marginBottom: '10px' }}>Demo Accounts (Pre-filled)</p>
                            <p style={{ fontSize: '12px', color: '#666', marginBottom: '5px' }}>📧 admin@printshop.com</p>
                            <p style={{ fontSize: '12px', color: '#666' }}>🔑 admin123</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
